trigger:
- main

pool: Default

steps:
- script: echo Hello, world!
  displayName: 'Run a one-line script'

- script: echo %NODE_EXTRA_CA_CERTS%
  displayName: 'Where am I?'


- task: FortifySCA@7
  inputs:
    applicationType: 'dotnet'
    fortifyProjects: '**\*.sln'
    buildAnalyzerParams: 'dotnet msbuild CSharp_12.sln'
    fortifyBuildId: 'riches'
    fortifyScanType: 'LocalScan'
    additionalScanParams: '-f debugscan.fpr'
    
- task: FortifySCA@7
  inputs:
    applicationType: 'other'
    buildAnalyzerParams: '-gopath C:\Users\Administrator\go -goroot C:\Program Files\Go'
    fortifyBuildId: 'secman'
    fortifyScanType: 'LocalScan'
    additionalScanParams: ''
    runFortifyUpload: true
    fortifyServerName: 'SSC Connection'
    fortifyApplicationName: 'secman'
    fortifyApplicationVersion: 'azure'
    fortifyBuildFailureCriteria: '[fortify priority order]:critical'
    taskResultForBuildFailureCriteria: 'FAIL'


